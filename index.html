<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>応募ページ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: url("oubo.png") center/cover no-repeat;
  height: 100vh;
  color: white;
}

/* タイトル */
.title-wrap {
  position: absolute;
  top: 0;
  width: 100%;
  text-align: center;
  padding-top: 30px;
  background: linear-gradient(rgba(0,0,0,0.6), transparent);
}

.title {
  font-size: clamp(22px, 5vw, 40px);
}

.sub {
  position: absolute;
  left: 10px;
  bottom: 10px;
  font-size: 12px;
}

/* 中央 */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.join-btn {
  font-size: 26px;
  border-bottom: 2px solid white;
  cursor: pointer;
}

/* モーダル */
.modal {
  position: fixed;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(8px);
  display: none;
  justify-content: center;
  align-items: center;
}

.card {
  width: min(90%, 600px);
  background: white;
  color: black;
  border-radius: 12px;
  padding: 20px;
}

.card-header {
  background: #d8f3ff;
  margin: -20px -20px 10px -20px;
  padding: 6px;
  display: flex;
  justify-content: space-between;
}

/* 人数 */
.count {
  font-size: 12px;
  color: #666;
}

/* 参加者 */
.users {
  display: flex;
  gap: 10px;
  overflow: hidden;
  flex-wrap: nowrap;
  margin-bottom: 20px; /* ← 余白追加ここ */
}

.users.expanded {
  flex-wrap: wrap;
}

.user {
  width: 55px;
  text-align: center;
  position: relative;
}

.cat {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  margin: auto;
}

.name {
  font-size: 10px;
  white-space: nowrap;
  overflow: hidden;
}

.remove {
  position: absolute;
  top: -5px;
  right: -5px;
  cursor: pointer;
}

/* 入力 */
.input-area {
  text-align: center;
  margin-top: 10px; /* ← 少し余白追加 */
}

input {
  width: 80%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.submit {
  margin-top: 12px;
  padding: 10px;
  background: #7edbff;
  border-radius: 10px;
  cursor: pointer;
  color: white;
  font-weight: bold;
}

/* 展開 */
.more {
  display: flex;
  align-items: center;
  cursor: pointer;
  font-size: 14px;
}

/* 成功 */
.success {
  text-align: center;
  color: #0077aa;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="title-wrap">
  <div class="title">第１回コスプレイベント『天気の子』</div>
</div>

<div class="sub">非公式</div>

<div class="center">
  <div>10日 21時</div>
  <div class="join-btn" onclick="openModal()">参加する</div>
</div>

<div class="modal" id="modal">
  <div class="card">

    <div class="card-header">
      <div>参加者</div>
      <div onclick="closeModal()">✕</div>
    </div>

    <div class="count" id="count"></div>

    <div id="success" class="success"></div>

    <div class="users" id="users"></div>

    <div class="input-area" id="inputArea">
      <input id="name" placeholder="自分だと分かる名前">
      <div class="submit" onclick="join()">参加予定</div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  onSnapshot, deleteDoc, doc, getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  projectId: "oubo-b776a"
});

const db = getFirestore(app);
const ref = collection(db, "participants");

let myId = localStorage.getItem("myId");
let expanded = false;

const max = 16;

/* 色 */
function randomColor() {
  return `hsl(${Math.random()*360},70%,85%)`;
}

/* モーダル */
window.openModal = () => modal.style.display = "flex";
window.closeModal = () => modal.style.display = "none";

/* 参加 */
window.join = async () => {
  const name = nameInput.value.trim();
  if (!name) return alert("名前を入れてください");

  const snap = await getDocs(ref);

  if (snap.size >= max) return alert("満員です");

  for (const d of snap.docs) {
    if (d.data().name === name) return alert("同じ名前は不可");
  }

  const docRef = await addDoc(ref, { name });
  myId = docRef.id;
  localStorage.setItem("myId", myId);

  showSuccess();
};

/* 削除 */
window.removeMe = async () => {
  await deleteDoc(doc(db, "participants", myId));
  localStorage.removeItem("myId");
  myId = null;
  success.innerText = "";
};

/* 成功 */
function showSuccess() {
  success.innerText =
  "参加予定になりました\nコスプレアバター準備をお願いします【任意】";
}

/* 表示 */
onSnapshot(ref, (snap) => {
  let list = [];

  snap.forEach(d => {
    list.push({ id: d.id, ...d.data() });
  });

  /* 自分を先頭 */
  list.sort(a => a.id === myId ? -1 : 1);

  const countNum = list.length;
  count.innerText = `${countNum} / 16`;

  users.innerHTML = "";

  const isMobile = window.innerWidth < 600;
  const limit = isMobile && !expanded ? 5 : list.length;

  list.slice(0, limit).forEach(u => {
    const el = document.createElement("div");
    el.className = "user";

    el.innerHTML = `
      ${u.id===myId?`<div class="remove" onclick="removeMe()">×</div>`:""}
      <div class="cat" style="background:${randomColor()}"></div>
      <div class="name">${u.name}</div>
    `;

    users.appendChild(el);
  });

  if (isMobile && list.length > 5) {
    const more = document.createElement("div");
    more.className = "more";

    if (!expanded) {
      more.innerText = `+${list.length-5} ＞`;
      more.onclick = () => expanded = true;
    } else {
      more.innerText = "＜";
      more.onclick = () => expanded = false;
    }

    users.appendChild(more);
  }

  if (list.find(u => u.id === myId)) {
    showSuccess();
    inputArea.style.display = "none";
  } else {
    inputArea.style.display = "block";
  }
});
</script>

</body>
</html>
