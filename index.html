
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>応募ページ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: url("oubo.png") center/cover no-repeat;
  height: 100vh;
  color: white;
}

/* タイトル */
.title-wrap {
  position: absolute;
  top: 0;
  width: 100%;
  text-align: center;
  padding-top: 30px;
  background: linear-gradient(rgba(0,0,0,0.6), transparent);
}

.title {
  font-size: clamp(22px, 5vw, 42px);
}

.sub {
  position: absolute;
  left: 10px;
  bottom: 10px;
  font-size: 12px;
}

/* 中央 */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.join-btn {
  font-size: clamp(20px, 4vw, 28px);
  border-bottom: 2px solid white;
  cursor: pointer;
}

/* モーダル */
.modal {
  position: fixed;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(8px);
  display: none;
  justify-content: center;
  align-items: center;
}

.card {
  width: min(90%, 600px);
  background: white;
  color: black;
  border-radius: 12px;
  padding: 20px;
}

/* ヘッダー */
.card-header {
  background: #d8f3ff;
  margin: -20px -20px 10px -20px;
  padding: 6px;
  display: flex;
  justify-content: space-between;
}

.users {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.user {
  width: 60px;
  text-align: center;
  position: relative;
}

.cat {
  width: 50px;
  height: 50px;
  background: #eaf9ff;
  border-radius: 50%;
  margin: auto;
}

.name {
  font-size: 10px;
  white-space: nowrap;
  overflow: hidden;
}

.remove {
  position: absolute;
  top: -5px;
  right: -5px;
  cursor: pointer;
}

/* 入力 */
.input-area {
  text-align: center;
  margin-top: 10px;
}

input {
  width: 80%;
  padding: 8px;
}

.submit {
  margin-top: 10px;
  color: #00a;
  cursor: pointer;
}

/* メッセージ */
.success {
  text-align: center;
  color: #0077aa;
  font-size: 14px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="title-wrap">
  <div class="title">第１回コスプレイベント『天気の子』</div>
</div>

<div class="sub">非公式</div>

<div class="center">
  <div>10日 21時</div>
  <div class="join-btn" onclick="openModal()">参加する</div>
</div>

<div class="modal" id="modal">
  <div class="card">

    <div class="card-header">
      <div>参加者</div>
      <div onclick="closeModal()">✕</div>
    </div>

    <div id="success" class="success"></div>

    <div class="users" id="users"></div>

    <div class="input-area" id="inputArea">
      <input id="name" placeholder="自分だと分かる名前">
      <div class="submit" onclick="join()">参加予定</div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  onSnapshot, deleteDoc, doc, getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "oubo-b776a.firebaseapp.com",
  projectId: "oubo-b776a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = collection(db, "participants");

let myId = localStorage.getItem("myId");

/* モーダル */
window.openModal = () => {
  document.getElementById("modal").style.display = "flex";
};

window.closeModal = () => {
  document.getElementById("modal").style.display = "none";
};

/* 参加 */
window.join = async () => {
  const name = document.getElementById("name").value.trim();
  if (!name) return alert("名前を入れてください");

  const snapshot = await getDocs(ref);

  if (snapshot.size >= 16) {
    alert("定員です（最大16人）");
    return;
  }

  for (const d of snapshot.docs) {
    if (d.data().name === name) {
      alert("同じ名前は使えません");
      return;
    }
  }

  const docRef = await addDoc(ref, { name });
  myId = docRef.id;
  localStorage.setItem("myId", myId);

  showSuccess();
};

/* 削除 */
window.removeMe = async () => {
  if (!myId) return;
  await deleteDoc(doc(db, "participants", myId));
  localStorage.removeItem("myId");
  myId = null;
  document.getElementById("success").innerText = "";
  document.getElementById("inputArea").style.display = "block";
};

/* 成功UI */
function showSuccess() {
  document.getElementById("success").innerText =
    "参加予定になりました\n事前準備：『天気の子』コスプレアバター【任意】";
  document.getElementById("inputArea").style.display = "none";
}

/* 表示 */
onSnapshot(ref, (snap) => {
  const users = document.getElementById("users");
  users.innerHTML = "";

  let foundMe = false;

  snap.forEach((d) => {
    const data = d.data();

    if (d.id === myId) foundMe = true;

    const el = document.createElement("div");
    el.className = "user";

    el.innerHTML = `
      ${d.id === myId ? `<div class="remove" onclick="removeMe()">×</div>` : ""}
      <div class="cat"></div>
      <div class="name">${data.name}</div>
    `;

    users.appendChild(el);
  });

  if (foundMe) showSuccess();
});
</script>

</body>
</html>
