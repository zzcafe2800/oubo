
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>応募ページ</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: url("oubo.png") center/cover no-repeat;
  height: 100vh;
  color: white;
  overflow: hidden;
}

/* タイトル */
.title-wrap {
  position: absolute;
  top: 0;
  width: 100%;
  text-align: center;
  padding-top: 40px;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0));
}

.title {
  font-size: 42px;
  font-weight: bold;
}

.sub {
  position: absolute;
  left: 10px;
  bottom: 10px;
  font-size: 12px;
}

/* 中央 */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.date {
  font-size: 18px;
  margin-bottom: 10px;
}

.join-btn {
  font-size: 28px;
  cursor: pointer;
  border-bottom: 2px solid white;
}

/* モーダル */
.modal {
  position: fixed;
  top: 0;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(8px);
  display: none;
  justify-content: center;
  align-items: center;
}

.card {
  background: #ffffff;
  color: #333;
  width: 650px;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* ウィンドウバー */
.card-header {
  background: #c9f0ff;
  padding: 6px;
  margin: -20px -20px 15px -20px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.close {
  cursor: pointer;
}

/* 参加者欄 */
.section-title {
  font-size: 14px;
  margin-bottom: 8px;
  color: #666;
}

.users {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 15px;
}

.user {
  text-align: center;
  width: 60px;
  position: relative;
}

.cat {
  width: 50px;
  height: 50px;
  background: #eaf9ff;
  border-radius: 50%;
  border: 2px solid #bdefff;
  margin: auto;
}

.name {
  font-size: 10px;
  white-space: nowrap;
  overflow: hidden;
}

/* 自分の削除 */
.remove {
  position: absolute;
  top: -5px;
  right: -5px;
  font-size: 10px;
  cursor: pointer;
  background: #fff;
  border-radius: 50%;
  padding: 2px 5px;
}

/* 入力 */
.input-area {
  text-align: center;
}

input {
  padding: 10px;
  width: 60%;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.submit {
  margin-top: 10px;
  cursor: pointer;
  color: #00aaff;
}

/* 完了メッセージ */
.success {
  text-align: center;
  font-size: 14px;
  color: #0077aa;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="title-wrap">
  <div class="title">第１回コスプレイベント『天気の子』</div>
</div>

<div class="sub">非公式</div>

<div class="center">
  <div class="date">10日 21時</div>
  <div class="join-btn" onclick="openModal()">参加する</div>
</div>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="card">

    <div class="card-header">
      <div>参加者</div>
      <div class="close" onclick="closeModal()">✕</div>
    </div>

    <div id="successMsg" class="success"></div>

    <div class="users" id="users"></div>

    <div class="input-area">
      <input id="name" placeholder="自分だと分かる名前">

      <div class="submit" onclick="join()">参加予定</div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2JwCj8pLomK5vDok4ul-e41ByhnFHJo4",
  authDomain: "oubo-b776a.firebaseapp.com",
  projectId: "oubo-b776a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const usersRef = collection(db, "participants");

let myId = localStorage.getItem("myId");

/* モーダル */
window.openModal = () => {
  document.getElementById("modal").style.display = "flex";
};

window.closeModal = () => {
  document.getElementById("modal").style.display = "none";
};

/* 参加 */
window.join = async () => {
  const name = document.getElementById("name").value;

  if (!name) {
    alert("名前を入れてください");
    return;
  }

  const docRef = await addDoc(usersRef, { name });
  localStorage.setItem("myId", docRef.id);
  myId = docRef.id;

  document.getElementById("successMsg").innerText =
    "参加予定になりました\n事前準備としてキャラクターのコスプレアバターの準備をお願いします【任意】";
};

/* 削除 */
window.removeMe = async () => {
  if (!myId) return;
  await deleteDoc(doc(db, "participants", myId));
  localStorage.removeItem("myId");
  myId = null;
  document.getElementById("successMsg").innerText = "";
};

/* 表示 */
onSnapshot(usersRef, (snapshot) => {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  snapshot.forEach((d) => {
    const data = d.data();

    const el = document.createElement("div");
    el.className = "user";

    let removeBtn = "";
    if (d.id === myId) {
      removeBtn = `<div class="remove" onclick="removeMe()">×</div>`;
    }

    el.innerHTML = `
      ${removeBtn}
      <div class="cat"></div>
      <div class="name">${data.name}</div>
    `;

    usersDiv.appendChild(el);
  });
});
</script>

</body>
</html>
