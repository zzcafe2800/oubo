<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>応募ページ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: url("oubo.png") center/cover no-repeat;
  color: white;
}

/* タイトル */
.title-wrap {
  text-align: center;
  padding-top: 30px;
  position: relative;
  background: linear-gradient(rgba(0,0,0,0.6), transparent);
}

.title {
  font-size: clamp(22px, 5vw, 40px);
}

.sub {
  position: absolute;
  right: 20px;
  bottom: 0;
  font-size: 12px;
}

/* 中央 */
.center {
  text-align: center;
  margin-top: 40px;
}

.date {
  font-size: 18px;
  margin-bottom: 10px;
}

/* フェード */
.fade {
  height: 40px;
  background: linear-gradient(rgba(0,0,0,0.4), transparent);
}

/* カード */
.card {
  width: min(92%, 600px);
  margin: 20px auto;
  background: white;
  color: black;
  border-radius: 12px;
  padding: 15px;
}

/* 上 */
.top {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 10px;
}

/* アイコン */
.users {
  display: flex;
  gap: 10px;
  overflow: hidden;
}

.wrap {
  flex-wrap: wrap;
}

.user {
  width: 55px;
  text-align: center;
  position: relative;
}

.cat {
  width: 45px;
  height: 45px;
  background: #eaf9ff;
  border-radius: 50%;
  margin: auto;
}

.name {
  font-size: 9px;
  white-space: nowrap;
  overflow: hidden;
}

/* 自分削除 */
.remove {
  position: absolute;
  top: -5px;
  right: -5px;
  cursor: pointer;
}

/* +表示 */
.more {
  display: flex;
  align-items: center;
  cursor: pointer;
  font-size: 14px;
}

/* 入力 */
.input-area {
  text-align: center;
  margin-top: 10px;
}

input {
  width: 80%;
  padding: 8px;
}

.submit {
  margin-top: 8px;
  cursor: pointer;
  color: #00a;
}

/* 成功 */
.success {
  text-align: center;
  color: #0077aa;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="title-wrap">
  <div class="title">第１回コスプレイベント『天気の子』</div>
  <div class="sub">非公式</div>
</div>

<div class="center">
  <div class="date">10日 21時</div>
</div>

<div class="fade"></div>

<div class="card">

  <div class="top">
    <div>参加者</div>
    <div id="count">0 / 16（残り16枠）</div>
  </div>

  <div id="users" class="users"></div>

  <div id="success" class="success"></div>

  <div class="input-area" id="inputArea">
    <input id="name" placeholder="自分だと分かる名前">
    <div class="submit" onclick="join()">参加予定</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  onSnapshot, deleteDoc, doc, getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const config = {
  apiKey: "AIzaSy...",
  authDomain: "oubo-b776a.firebaseapp.com",
  projectId: "oubo-b776a"
};

const app = initializeApp(config);
const db = getFirestore(app);
const ref = collection(db, "participants");

let myId = localStorage.getItem("myId");
let expanded = false;

/* 参加 */
window.join = async () => {
  const name = document.getElementById("name").value.trim();
  if (!name) return alert("名前を入れてください");

  const snap = await getDocs(ref);

  if (snap.size >= 16) return alert("定員です");

  for (const d of snap.docs) {
    if (d.data().name === name) {
      return alert("同じ名前は使えません");
    }
  }

  const docRef = await addDoc(ref, { name });
  myId = docRef.id;
  localStorage.setItem("myId", myId);

  showSuccess();
};

/* 削除 */
window.removeMe = async () => {
  await deleteDoc(doc(db, "participants", myId));
  localStorage.removeItem("myId");
  myId = null;
  document.getElementById("success").innerText = "";
  document.getElementById("inputArea").style.display = "block";
};

/* 成功 */
function showSuccess() {
  document.getElementById("success").innerText =
    "参加予定になりました\nコスプレアバターの準備をお願いします【任意】";
  document.getElementById("inputArea").style.display = "none";
}

/* 展開 */
window.toggle = () => {
  expanded = !expanded;
  render(lastData);
};

let lastData = [];

/* 表示 */
onSnapshot(ref, (snap) => {
  let arr = [];

  snap.forEach(d => {
    arr.push({ id: d.id, name: d.data().name });
  });

  /* 自分を先頭 */
  arr.sort((a) => (a.id === myId ? -1 : 1));

  lastData = arr;
  render(arr);

  /* 人数 */
  const count = arr.length;
  document.getElementById("count").innerText =
    `${count} / 16（残り${16 - count}枠）`;

  if (arr.find(v => v.id === myId)) showSuccess();
});

/* 描画 */
function render(arr) {
  const users = document.getElementById("users");
  users.innerHTML = "";

  const isMobile = window.innerWidth < 600;
  let list = arr;

  if (isMobile && !expanded && arr.length > 5) {
    list = arr.slice(0, 5);
  }

  list.forEach(v => {
    const el = document.createElement("div");
    el.className = "user";

    el.innerHTML = `
      ${v.id === myId ? `<div class="remove" onclick="removeMe()">×</div>` : ""}
      <div class="cat"></div>
      <div class="name">${v.name}</div>
    `;
    users.appendChild(el);
  });

  /* 省略UI */
  if (isMobile && arr.length > 5) {
    const more = document.createElement("div");
    more.className = "more";
    more.onclick = toggle;

    more.innerText = expanded ? "＜" : `+${arr.length - 5} ＞`;

    users.appendChild(more);
  }

  users.classList.toggle("wrap", expanded);
}
</script>

</body>
</html>
